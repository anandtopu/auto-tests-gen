# Org-layer customization (architecture §5.10 rule 4)
models:
  triage: claude-haiku-4-5-20251001
  resolve_llm: claude-haiku-4-5-20251001
  generate: claude-sonnet-4-6
  escalate: claude-opus-4-8          # after 2 failed generate attempts
phases:
  resolve:   { max_turns: 5,  allowed_tools: "Read" }
  triage:    { max_turns: 12, allowed_tools: "Read,Bash(git diff:*)" }   # 5 was too tight for real tool use (parity finding P1)
  analyze:   { max_turns: 12, allowed_tools: "Read" }
  testplan:  { max_turns: 10, allowed_tools: "Read,Write" }
  testdata:  { max_turns: 10, allowed_tools: "Read,Write" }
  generate:  { max_turns: 25, allowed_tools: "Read,Write,Edit,Bash(npx playwright test:*),Bash(npm run lint:*)" }
  validate:  { max_turns: 15, allowed_tools: "Read,Edit,Bash(npx playwright test:*)" , repair_loops: 3 }
  # Read-only ON PURPOSE: a critic that can Write/Edit is an unreviewed repair loop,
  # not a second opinion. Advisory status depends on it staying this way (§3.2).
  critic:    { max_turns: 8,  allowed_tools: "Read" }
# How much this platform depends on OpenHands (docs/integrations/standalone-operation.md):
#   off       never contact it — the estate runs standalone (CI / TaskEvent / queue)
#   auto      hybrid (default): use it when reachable, fall back when not; an outage
#             is reported as `degraded` and is never fatal
#   required  a hard dependency — an outage fails `make check-integrations`
# AIQE_OPENHANDS overrides this for a single run.
openhands:
  mode: auto
# Advisory critic (openhands-review §3.2). Scores generated-test QUALITY for the human
# reviewer and the "escaped noise" metric — it NEVER gates a commit. Thresholds only
# label the score; AIQE_CRITIC=0 skips the phase for a single run.
critic:
  enabled: true
  accept_threshold: 0.8
  review_threshold: 0.5
resolution:
  confidence_threshold: 0.8
  clarify_channels: [tracker, notify]   # post question to Jira + Slack when below threshold
catalog:
  auto_accept_confidence: 0.85
  review_band: [0.5, 0.85]
budgets:
  max_cost_usd_single_suite: 2.0
  max_cost_usd_cross_repo: 4.0
knowledge:
  confluence_max_pages: 3
  confluence_max_tokens: 12000
adapters:
  scm: { github: adapters/scm/github.sh, bitbucket: adapters/scm/bitbucket.sh, stash: adapters/scm/stash.sh }
  tracker: adapters/tracker/jira.sh
  knowledge: adapters/knowledge/confluence.sh
  cicd: adapters/cicd/jenkins.sh
  notify: adapters/notify/slack.sh
  telemetry: adapters/telemetry/splunk.sh
