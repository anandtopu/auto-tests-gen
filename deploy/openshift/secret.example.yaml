# EXAMPLE secret — copy to secret.yaml, fill values, and keep it OUT of git.
# In mock mode only the two service tokens matter; the rest are for real mode
# (AIQE_MOCK=0). Anything set here is injected as environment variables and, because
# settings_store.load_env_into() treats explicit env as authoritative, overrides .env.
#
#   cp secret.example.yaml secret.yaml && $EDITOR secret.yaml
#   oc create secret generic ai-qe-secrets --from-env-file=<(...)   # or apply this file
apiVersion: v1
kind: Secret
metadata:
  name: ai-qe-secrets
  labels:
    app.kubernetes.io/part-of: ai-qe
type: Opaque
stringData:
  # --- Platform service auth (set these even in mock mode if the Routes are public) ---
  AIQE_UI_TOKEN: "change-me-ui"          # dashboard ?token= / Authorization: Bearer
  AIQE_HOOK_TOKEN: "change-me-hook"      # receiver X-AIQE-Token

  # --- Real mode (AIQE_MOCK=0) — otherwise leave blank ---
  ANTHROPIC_API_KEY: ""
  GITHUB_TOKEN: ""
  BITBUCKET_TOKEN: ""
  STASH_URL: ""
  STASH_PROJECT: ""
  STASH_TOKEN: ""
  JIRA_URL: ""
  ATLASSIAN_MCP_TOKEN: ""
  CONFLUENCE_URL: ""
  OPENHANDS_URL: ""
  OPENHANDS_API_KEY: ""
  SLACK_WEBHOOK_URL: ""
  SPLUNK_HEC_URL: ""
  SPLUNK_HEC_TOKEN: ""
